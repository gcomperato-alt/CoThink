<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoThink - Refine Your Input for AI</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f4ef;
      color: #1f1f1f;
    }

    .page {
      min-height: 100vh;
      padding: 28px 18px 40px;
    }

    .wrap {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .brand img {
      width: 130px;
      max-width: 35vw;
      height: auto;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 52px;
      letter-spacing: -2px;
    }

    .brand-text .co {
      color: #ef3b1f;
    }

    .subtitle {
      margin: 4px 0 0;
      font-size: 17px;
      color: #3f3a35;
    }

    .card {
      width: 100%;
      background: #fffaf0;
      border: 1px solid #e0d8c8;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 28px;
      align-items: end;
    }

    label {
      display: block;
      margin: 18px 0 8px;
      font-weight: bold;
      font-size: 22px;
    }

    textarea {
      width: 100%;
      min-height: 145px;
      resize: vertical;
      border-radius: 16px;
      border: 1px solid #ccc3b4;
      padding: 16px;
      font-size: 18px;
      line-height: 1.5;
      background: #ffffff;
      color: #222;
    }

    textarea:focus {
      outline: 2px solid #222;
      border-color: #222;
    }

    .modes, .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 10px 0 18px;
    }

    .mode-btn {
      border: 1px solid #d9cfc3;
      background: #fff;
      border-radius: 14px;
      padding: 13px 20px;
      cursor: pointer;
      font-size: 17px;
    }

    .mode-btn.active {
      background: #1f2329;
      color: #fff;
      border-color: #1f2329;
    }

    button.main, button.accent, button.secondary {
      border-radius: 14px;
      padding: 14px 20px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      font-weight: bold;
    }

    button.main {
      background: #1f2329;
      color: white;
    }

    button.accent {
      background: #ef3b1f;
      color: white;
    }

    button.secondary {
      background: #ffffff;
      color: #1f1f1f;
      border: 1px solid #d9cfc3;
      font-weight: normal;
    }

    button:hover { opacity: 0.9; }

    .status {
      margin-top: 12px;
      font-size: 18px;
      color: #287a3e;
    }

    .output-box {
      margin-top: 12px;
      background: #fffdf8;
      border: 1px solid #d8cfbf;
      border-radius: 18px;
      padding: 20px;
      min-height: 140px;
      white-space: pre-wrap;
      line-height: 1.55;
      font-size: 18px;
    }

    .paste-card {
      background: #f7fbf2;
      border: 1px solid #d2dfc8;
      border-radius: 18px;
      padding: 24px;
      text-align: center;
      color: #1f2329;
    }

    .paste-card h2 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    .paste-card p {
      margin: 8px 0;
      font-size: 17px;
    }

    .shortcut {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      margin: 18px 0;
      font-size: 26px;
      font-weight: bold;
    }

    .key {
      background: white;
      border: 1px solid #d8cfbf;
      border-radius: 12px;
      padding: 14px 22px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    }

    .small {
      margin-top: 18px;
      font-size: 15px;
      color: #70695f;
    }

    @media (max-width: 850px) {
      .content-grid {
        grid-template-columns: 1fr;
      }

      .brand-text h1 {
        font-size: 42px;
      }

      .brand img {
        width: 95px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="wrap">

      <header class="brand">
        <img src="cothink-logo.png" alt="CoThink logo" />
        <div class="brand-text">
          <h1><span class="co">Co</span>Think</h1>
          <p class="subtitle">Messy thought in. Clear AI-ready prompt out.</p>
        </div>
      </header>

      <section class="card">
        <div class="content-grid">
          <div>
            <label for="userInput">Your rough input</label>
            <textarea id="userInput" placeholder="Type your messy thought here..."></textarea>

            <label>What do you want the AI to do?</label>
            <div class="modes">
              <button class="mode-btn active" data-mode="general">General</button>
              <button class="mode-btn" data-mode="answer">Answer</button>
              <button class="mode-btn" data-mode="explain">Explain</button>
              <button class="mode-btn" data-mode="rewrite">Rewrite</button>
              <button class="mode-btn" data-mode="plan">Plan</button>
              <button class="mode-btn" data-mode="code">Code</button>
              <button class="mode-btn" data-mode="question">Ask better question</button>
            </div>

            <div class="actions">
              <button class="main" id="refineBtn">✨ Refine for AI</button>
              <button class="accent" id="useBtn">↗ Use with AI</button>
              <button class="secondary" id="copyBtn">Copy result</button>
              <button class="secondary" id="clearBtn">Clear</button>
            </div>

            <div class="status" id="status"></div>

            <label>Your input, refined for better AI results</label>
            <div class="output-box" id="outputBox">
              Your refined prompt will appear here.
            </div>

            <p class="small">
              CoThink does not answer for you. It helps you ask better, so the AI answers better.
            </p>
          </div>

          <aside class="paste-card">
            <h2>Don’t forget to paste!</h2>
            <p>Use the keyboard shortcut:</p>

            <div class="shortcut">
              <span class="key">Ctrl</span>
              <span>+</span>
              <span class="key">V</span>
            </div>

            <p>Paste the refined prompt into your AI chat.</p>
          </aside>
        </div>
      </section>
    </div>
  </main>

  <script>
    const userInput = document.getElementById('userInput');
    const outputBox = document.getElementById('outputBox');
    const refineBtn = document.getElementById('refineBtn');
    const useBtn = document.getElementById('useBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusText = document.getElementById('status');
    const modeButtons = document.querySelectorAll('.mode-btn');

    let currentMode = 'general';

    modeButtons.forEach(button => {
      button.addEventListener('click', () => {
        modeButtons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        currentMode = button.dataset.mode;
      });
    });

    refineBtn.addEventListener('click', async () => {
      const text = userInput.value.trim();

      if (!text) {
        outputBox.textContent = 'Type something first.';
        statusText.textContent = '';
        return;
      }

      statusText.textContent = 'CoThink is refining...';
      outputBox.textContent = 'Thinking...';

      try {
        const response = await fetch('/api/refine', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            text,
            mode: currentMode
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Request failed');
        }

        outputBox.textContent = data.refined;
        statusText.textContent = '✓ Refined. You’re good to go.';
      } catch (error) {
        outputBox.textContent = 'Something went wrong. Please try again.';
        statusText.textContent = error.message;
      }
    });

    useBtn.addEventListener('click', async () => {
      const result = outputBox.textContent.trim();

      if (!result || result === 'Your refined prompt will appear here.' || result === 'Thinking...') {
        statusText.textContent = 'Nothing ready yet.';
        return;
      }

      try {
        await navigator.clipboard.writeText(result);
        statusText.textContent = 'Copied. Opening ChatGPT... Now press Ctrl + V.';
        window.open('https://chat.openai.com', '_blank');
      } catch (error) {
        statusText.textContent = 'Copy failed. Please copy manually, then press Ctrl + V.';
      }
    });

    copyBtn.addEventListener('click', async () => {
      const result = outputBox.textContent.trim();

      if (!result || result === 'Your refined prompt will appear here.' || result === 'Thinking...') {
        statusText.textContent = 'Nothing to copy yet.';
        return;
      }

      try {
        await navigator.clipboard.writeText(result);
        statusText.textContent = 'Copied. Open your AI chat and press Ctrl + V.';
      } catch (error) {
        statusText.textContent = 'Copy failed. Select the text manually.';
      }
    });

    clearBtn.addEventListener('click', () => {
      userInput.value = '';
      outputBox.textContent = 'Your refined prompt will appear here.';
      statusText.textContent = '';
    });
  </script>
</body>
</html>
